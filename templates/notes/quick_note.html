{% extends 'base.html' %}

{% block title %}快速创建笔记 - 信息工作台{% endblock %}
{% block page_title %}快速创建笔记{% endblock %}

{% block extra_css %}
<!-- Vditor CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.css">
<style>
.vditor {
    border-radius: 12px;
    border: 1px solid #e5e7eb;
}
.vditor-toolbar {
    border-radius: 12px 12px 0 0;
}
.vditor-content {
    border-radius: 0 0 12px 12px;
}
.vditor-preview {
    background-color: #f9fafb;
}
</style>
{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">
    <form method="post" class="bg-white rounded-2xl shadow-sm border border-gray-100">
        {% csrf_token %}
        <input type="hidden" name="article_type" value="{{ article_type }}">
        <input type="hidden" name="article_id" value="{{ article_id }}">

        <div class="p-6 border-b border-gray-100">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-semibold text-gray-800">快速创建笔记</h2>
                <div class="flex items-center space-x-3">
                    <a href="{% url 'home' %}" class="px-4 py-2 border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition-colors">
                        取消
                    </a>
                    <button type="submit" class="px-4 py-2 bg-green-600 text-white rounded-xl hover:bg-green-700 transition-colors">
                        <i class="fas fa-save mr-2"></i>保存
                    </button>
                </div>
            </div>
        </div>

        <div class="p-6 space-y-6">
            <!-- Title -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">标题</label>
                <input type="text" name="title" value="{{ initial_title }}" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all outline-none text-lg font-medium"
                    placeholder="输入笔记标题...">
            </div>

            <!-- Tags -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">标签</label>
                <input type="text" name="tags"
                    class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all outline-none"
                    placeholder="用逗号分隔标签，如：工作, 学习, 想法">
            </div>

            <!-- Content - Vditor -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">内容</label>
                <div id="vditor"></div>
                <textarea name="content" id="contentField" style="display: none;">{{ initial_content }}</textarea>
            </div>
        </div>
    </form>
</div>

<!-- Vditor JS -->
<script src="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.min.js"></script>
<script>
let vditor;

document.addEventListener('DOMContentLoaded', function() {
    const contentField = document.getElementById('contentField');
    const initialContent = contentField.value || '';

    vditor = new Vditor('vditor', {
        height: 500,
        placeholder: '开始写作...',
        theme: 'classic',
        icon: 'material',
        lang: 'zh_CN',
        mode: 'wysiwyg',
        value: initialContent,
        toolbar: [
            'emoji',
            'headings',
            'bold',
            'italic',
            'strike',
            'link',
            '|',
            'list',
            'ordered-list',
            'check',
            'outdent',
            'indent',
            '|',
            'quote',
            'line',
            'code',
            'inline-code',
            'insert-before',
            'insert-after',
            '|',
            'upload',
            'record',
            'table',
            '|',
            'undo',
            'redo',
            '|',
            'fullscreen',
            'edit-mode',
            {
                name: 'more',
                toolbar: [
                    'both',
                    'code-theme',
                    'content-theme',
                    'export',
                    'outline',
                    'preview',
                ],
            },
        ],
        toolbarConfig: {
            pin: true,
        },
        cache: {
            enable: true,
            id: 'vditor-quick-note',
        },
        counter: {
            enable: true,
            type: 'text',
        },
        preview: {
            delay: 100,
            show: false,
            markdown: {
                toc: true,
            },
        },
        upload: {
            max: 10 * 1024 * 1024,
            linkToImgUrl: '',
            handler(files) {
                const reader = new FileReader();
                reader.readAsDataURL(files[0]);
                reader.onload = function() {
                    vditor.insertValue(`![${files[0].name}](${reader.result})`);
                };
                return '';
            },
        },
        input(value) {
            contentField.value = value;
        },
        after() {
            contentField.value = vditor.getValue();
        },
    });

    document.querySelector('form').addEventListener('submit', function() {
        if (vditor) {
            contentField.value = vditor.getValue();
        }
        localStorage.removeItem('vditor-quick-note');
    });
});
</script>
{% endblock %}
