{% extends 'base.html' %}

{% block title %}书签分类{% endblock %}

{% block page_header %}
<div class="max-w-3xl mx-auto px-6 pt-8 pb-2">
    <div class="flex items-center justify-between">
        <h1 class="text-xl font-semibold text-gray-900 dark:text-gray-100">书签分类</h1>
        <a href="{% url 'bookmarks:category_add' %}" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700">+ 新建</a>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-6">
    {% if categories %}
    <div class="divide-y divide-gray-100 dark:divide-gray-800">
        {% for cat in categories %}
        <div class="flex items-center justify-between py-4 group">
            <div>
                <p class="text-base text-gray-800 dark:text-gray-200">{{ cat.name }}</p>
                <p class="text-xs text-gray-400 mt-0.5">{{ cat.bookmark_set.count }} 个书签</p>
            </div>
            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                <a href="{% url 'bookmarks:category_edit' cat.pk %}" class="px-3 py-1.5 rounded-lg bg-gray-100 dark:bg-gray-800 text-sm text-gray-500 hover:bg-gray-200">编辑</a>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="py-20 text-center text-gray-400"><p class="text-base mb-4">暂无分类</p><a href="{% url 'bookmarks:category_add' %}" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700">+ 新建</a></div>
    {% endif %}
</div>
{% endblock %}
