{% extends 'base.html' %}

{% block title %}新建分类 - 工作台{% endblock %}
{% block page_title %}新建分类{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <form method="post">
            {% csrf_token %}

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">分类名称 <span class="text-red-500">*</span></label>
                    <input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none transition-all" placeholder="输入分类名称">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">图标</label>
                    <input type="text" name="icon" value="fas fa-folder" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none transition-all" placeholder="fas fa-folder">
                    <p class="text-xs text-gray-400 mt-1">使用 Font Awesome 图标类名，如 fas fa-folder, fas fa-code 等</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">颜色</label>
                    <div class="flex items-center space-x-3">
                        <input type="color" name="color" value="#3B82F6" class="w-12 h-10 rounded cursor-pointer">
                        <input type="text" value="#3B82F6" class="flex-1 px-4 py-2 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none transition-all" readonly id="colorText">
                    </div>
                </div>

                <div class="flex items-center justify-end space-x-4 pt-4 border-t border-gray-100">
                    <a href="{% url 'bookmarks:category_list' %}" class="px-6 py-2 text-gray-600 hover:text-gray-800 transition-colors">取消</a>
                    <button type="submit" class="px-6 py-2 bg-primary-600 text-white rounded-xl hover:bg-primary-700 transition-colors">
                        <i class="fas fa-save mr-2"></i>创建
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
document.querySelector('input[type="color"]').addEventListener('input', function(e) {
    document.getElementById('colorText').value = e.target.value;
});
</script>
{% endblock %}
