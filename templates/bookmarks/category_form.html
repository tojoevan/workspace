{% extends 'base.html' %}

{% block title %}{% if category %}编辑分类{% else %}新建分类{% endif %}{% endblock %}

{% block page_header %}
<div class="max-w-3xl mx-auto px-6 pt-8 pb-2">
    <div class="flex items-center gap-3">
        <a href="{% url 'bookmarks:category_list' %}" class="text-sm text-gray-400 hover:text-gray-600">← 分类</a>
        <h1 class="text-xl font-semibold text-gray-900 dark:text-gray-100">{% if category %}编辑分类{% else %}新建分类{% endif %}</h1>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-6 py-6">
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <input type="text" name="name" value="{{ category.name|default:'' }}" required placeholder="分类名称"
            class="w-full px-4 py-3 bg-white dark:bg-[#161616] border border-gray-200 dark:border-gray-700 rounded-xl text-base text-gray-800 dark:text-gray-200 placeholder-gray-400 focus:outline-none focus:border-blue-500">
        <div class="flex items-center gap-3 pt-2">
            <button type="submit" class="px-5 py-2.5 bg-blue-600 text-white text-sm rounded-xl hover:bg-blue-700">保存</button>
            <a href="{% url 'bookmarks:category_list' %}" class="px-5 py-2.5 border border-gray-200 dark:border-gray-700 text-sm rounded-xl text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800">取消</a>
        </div>
    </form>
</div>
{% endblock %}
