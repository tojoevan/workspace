{% extends 'base.html' %}

{% block title %}编辑订阅源 - {{ feed.title }} - 信息工作台{% endblock %}
{% block page_title %}编辑订阅源{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100">
        <div class="p-6 border-b border-gray-100">
            <h2 class="text-lg font-semibold text-gray-800">编辑 RSS 订阅源</h2>
            <p class="text-sm text-gray-500 mt-1">修改订阅源信息</p>
        </div>
        
        <form method="post" class="p-6 space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">订阅源名称</label>
                <input type="text" name="title" value="{{ feed.title }}" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition-all outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">描述</label>
                <textarea name="description" rows="3"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition-all outline-none resize-none">{{ feed.description }}</textarea>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">RSS 链接</label>
                <input type="url" value="{{ feed.url }}" disabled
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-500 cursor-not-allowed">
                <p class="text-xs text-gray-500 mt-2">RSS 链接不可修改</p>
            </div>
            
            <div class="flex items-center space-x-3">
                <input type="checkbox" name="is_active" id="is_active" {% if feed.is_active %}checked{% endif %} class="w-5 h-5 text-orange-600 rounded border-gray-300 focus:ring-orange-500">
                <label for="is_active" class="text-gray-700">启用订阅源</label>
            </div>
            
            <div class="flex items-center space-x-4 pt-4">
                <button type="submit" class="flex-1 py-3 px-4 bg-orange-600 text-white font-medium rounded-xl hover:bg-orange-700 transition-colors">
                    <i class="fas fa-save mr-2"></i>保存修改
                </button>
                <a href="{% url 'rss:feed_detail' feed.id %}" class="px-6 py-3 border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition-colors">
                    取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
