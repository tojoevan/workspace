{% extends 'base.html' %}

{% block title %}添加 RSS 订阅 - 信息阅读工作台{% endblock %}
{% block page_title %}添加 RSS 订阅{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100">
        <div class="p-6 border-b border-gray-100">
            <h2 class="text-lg font-semibold text-gray-800">添加 RSS 订阅源</h2>
            <p class="text-sm text-gray-500 mt-1">输入 RSS 链接，我们会自动获取内容</p>
        </div>
        
        <form method="post" class="p-6 space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    RSS 链接 <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <input type="url" name="url" required 
                        class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition-all outline-none"
                        placeholder="https://example.com/feed.xml">
                    <i class="fas fa-link absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
                <p class="text-xs text-gray-500 mt-2">
                    <i class="fas fa-info-circle mr-1"></i>
                    支持 RSS 2.0、Atom 等格式
                </p>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    自定义标题 <span class="text-gray-400">(可选)</span>
                </label>
                <input type="text" name="title" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 transition-all outline-none"
                    placeholder="留空将自动获取">
            </div>
            
            <!-- Popular Feeds -->
            <div class="bg-gray-50 rounded-xl p-4">
                <h3 class="text-sm font-medium text-gray-700 mb-3">推荐订阅源</h3>
                <div class="flex flex-wrap gap-2">
                    <button type="button" onclick="fillUrl('https://www.zhihu.com/rss')" class="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm text-gray-600 hover:border-orange-500 hover:text-orange-600 transition-colors">
                        知乎每日精选
                    </button>
                    <button type="button" onclick="fillUrl('https://sspai.com/feed')" class="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm text-gray-600 hover:border-orange-500 hover:text-orange-600 transition-colors">
                        少数派
                    </button>
                    <button type="button" onclick="fillUrl('https://www.ifanr.com/feed')" class="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm text-gray-600 hover:border-orange-500 hover:text-orange-600 transition-colors">
                        爱范儿
                    </button>
                    <button type="button" onclick="fillUrl('https://www.36kr.com/feed')" class="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm text-gray-600 hover:border-orange-500 hover:text-orange-600 transition-colors">
                        36氪
                    </button>
                    <button type="button" onclick="fillUrl('https://feeds.appinn.com/appinns/')" class="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm text-gray-600 hover:border-orange-500 hover:text-orange-600 transition-colors">
                        小众软件
                    </button>
                </div>
            </div>
            
            <div class="flex items-center space-x-4 pt-4">
                <button type="submit" class="flex-1 py-3 px-4 bg-orange-600 text-white font-medium rounded-xl hover:bg-orange-700 transition-colors">
                    <i class="fas fa-plus mr-2"></i>添加订阅源
                </button>
                <a href="{% url 'rss:feed_list' %}" class="px-6 py-3 border border-gray-200 text-gray-700 rounded-xl hover:bg-gray-50 transition-colors">
                    取消
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function fillUrl(url) {
    document.querySelector('input[name="url"]').value = url;
}
</script>
{% endblock %}
