{% extends 'base.html' %}

{% block title %}用户设置{% endblock %}

{% block page_header %}
<div class="max-w-3xl mx-auto px-6 pt-8 pb-2">
    <h1 class="text-xl font-semibold text-gray-900 dark:text-gray-100">用户设置</h1>
</div>
{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-6 py-4 space-y-8">

    <!-- 基本信息 -->
    <div class="py-4 border-b border-gray-100 dark:border-gray-800">
        <h2 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-4">基本信息</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-gray-400 mb-1.5">用户名</label>
                <p class="text-base text-gray-800 dark:text-gray-200">{{ user.username }}</p>
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1.5">别名（用于登录）</label>
                <form method="post">
                    {% csrf_token %}
                    <div class="flex gap-2">
                        <input type="text" name="alias" value="{{ profile.alias|default:'' }}" placeholder="设置别名后可用别名登录"
                            class="flex-1 px-4 py-2.5 bg-white dark:bg-[#161616] border border-gray-200 dark:border-gray-700 rounded-xl text-sm text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500">
                        <button type="submit" class="px-4 py-2.5 bg-blue-600 text-white text-sm rounded-xl hover:bg-blue-700 transition-colors">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- OpenAI 设置 -->
    <div class="py-4 border-b border-gray-100 dark:border-gray-800">
        <h2 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-4">AI 设置</h2>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs text-gray-400 mb-1.5">API 密钥</label>
                <input type="password" name="openai_api_key" value="{{ profile.openai_api_key|default:'' }}"
                    placeholder="sk-..." class="w-full px-4 py-2.5 bg-white dark:bg-[#161616] border border-gray-200 dark:border-gray-700 rounded-xl text-sm text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5">API 地址</label>
                    <input type="text" name="openai_base_url" value="{{ profile.openai_base_url|default:'' }}"
                        placeholder="https://api.openai.com/v1" class="w-full px-4 py-2.5 bg-white dark:bg-[#161616] border border-gray-200 dark:border-gray-700 rounded-xl text-sm text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5">模型</label>
                    <input type="text" name="openai_model" value="{{ profile.openai_model|default:'gpt-3.5-turbo' }}"
                        placeholder="gpt-3.5-turbo" class="w-full px-4 py-2.5 bg-white dark:bg-[#161616] border border-gray-200 dark:border-gray-700 rounded-xl text-sm text-gray-800 dark:text-gray-200 focus:outline-none focus:border-blue-500">
                </div>
            </div>
            <div>
                <label class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400 cursor-pointer">
                    <input type="checkbox" name="show_quote" value="1" {% if profile.show_quote %}checked{% endif %} class="rounded">
                    显示每日鸡汤文
                </label>
            </div>
            <button type="submit" class="px-5 py-2.5 bg-blue-600 text-white text-sm rounded-xl hover:bg-blue-700 transition-colors">保存设置</button>
        </form>
    </div>


</div>
{% endblock %}
