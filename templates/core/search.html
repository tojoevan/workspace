{% extends 'base.html' %}

{% block title %}搜索{% endblock %}

{% block page_header %}
<div class="max-w-3xl mx-auto px-6 pt-8 pb-2">
    <h1 class="text-xl font-semibold text-gray-900 dark:text-gray-100">搜索</h1>
</div>
{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-6 py-6">
    <form method="get" class="mb-6">
        <input type="text" name="q" value="{{ q|default:'' }}" placeholder="搜索..."
            class="w-full px-4 py-3 bg-white dark:bg-[#161616] border border-gray-200 dark:border-gray-700 rounded-xl text-base text-gray-800 dark:text-gray-200 placeholder-gray-400 focus:outline-none focus:border-blue-500" autofocus>
    </form>
    {% if q %}
    <p class="text-sm text-gray-400 mb-4">"{{ q }}" 的结果</p>
    {% endif %}
    {% if results %}
    <div class="divide-y divide-gray-100 dark:divide-gray-800">
        {% for r in results %}
        <div class="py-3">
            <a href="{{ r.url }}" class="text-base text-gray-800 dark:text-gray-200 hover:text-blue-600">{{ r.title }}</a>
            <p class="text-sm text-gray-400 mt-0.5">{{ r.type }} · {{ r.date }}</p>
        </div>
        {% endfor %}
    </div>
    {% endif %}
</div>
{% endblock %}
