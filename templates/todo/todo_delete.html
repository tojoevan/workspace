{% extends 'base.html' %}

{% block title %}删除待办{% endblock %}

{% block page_header %}
<div class="max-w-3xl mx-auto px-6 pt-8 pb-2">
    <h1 class="text-xl font-semibold text-gray-900 dark:text-gray-100">确认删除</h1>
</div>
{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-6 py-6 space-y-5">
    <p class="text-base text-gray-600 dark:text-gray-400">确定删除「<strong class="text-gray-800 dark:text-gray-200">{{ todo.title }}</strong>」吗？此操作不可撤销。</p>
    <form method="post" class="flex items-center gap-3">
        {% csrf_token %}
        <button type="submit" class="px-5 py-2.5 bg-red-600 text-white text-sm rounded-xl hover:bg-red-700 transition-colors">确认删除</button>
        <a href="{% url 'todo:todo_list' %}" class="px-5 py-2.5 border border-gray-200 dark:border-gray-700 text-sm rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">取消</a>
    </form>
</div>
{% endblock %}
