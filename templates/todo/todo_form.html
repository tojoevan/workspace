{% extends 'base.html' %}

{% block title %}{% if action == 'add' %}新建待办{% else %}编辑待办{% endif %} - 阅读工作台{% endblock %}
{% block page_title %}{% if action == 'add' %}新建待办{% else %}编辑待办{% endif %}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <form method="post">
            {% csrf_token %}

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">标题 <span class="text-red-500">*</span></label>
                    <input type="text" name="title" value="{% if todo %}{{ todo.title }}{% endif %}" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none transition-all" placeholder="输入待办标题">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">描述</label>
                    <textarea name="description" rows="4" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none transition-all resize-none" placeholder="输入详细描述（可选）">{% if todo %}{{ todo.description }}{% endif %}</textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">优先级</label>
                        <select name="priority" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none transition-all">
                            <option value="low" {% if todo and todo.priority == 'low' %}selected{% endif %}>低</option>
                            <option value="medium" {% if not todo or todo.priority == 'medium' %}selected{% endif %}>中</option>
                            <option value="high" {% if todo and todo.priority == 'high' %}selected{% endif %}>高</option>
                        </select>
                    </div>

                    {% if todo %}
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">状态</label>
                        <select name="status" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none transition-all">
                            <option value="pending" {% if todo.status == 'pending' %}selected{% endif %}>待处理</option>
                            <option value="in_progress" {% if todo.status == 'in_progress' %}selected{% endif %}>进行中</option>
                            <option value="completed" {% if todo.status == 'completed' %}selected{% endif %}>已完成</option>
                        </select>
                    </div>
                    {% endif %}

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">截止时间</label>
                        <input type="datetime-local" name="due_date" value="{% if todo and todo.due_date %}{{ todo.due_date|date:'Y-m-d\TH:i' }}{% endif %}" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none transition-all">
                    </div>
                </div>

                <div class="flex items-center justify-end space-x-4 pt-4 border-t border-gray-100">
                    <a href="{% url 'todo:todo_list' %}" class="px-6 py-2 text-gray-600 hover:text-gray-800 transition-colors">取消</a>
                    <button type="submit" class="px-6 py-2 bg-primary-600 text-white rounded-xl hover:bg-primary-700 transition-colors">
                        <i class="fas fa-save mr-2"></i>{% if action == 'add' %}创建{% else %}保存{% endif %}
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
